name: Auto Post to Telegram Channel

on:
  schedule:
    - cron: '0 * * * *'          # Каждый час
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Тестовый режим (сразу публикует пост и отвечает на комменты)'
        required: false
        default: false
        type: boolean

jobs:
  post-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache SQLite database
        uses: actions/cache@v3
        with:
          path: bot_memory.db
          key: bot-memory-${{ github.run_id }}
          restore-keys: |
            bot-memory-

      - name: Install Dependencies
        run: |
          pip install requests
          pip install huggingface_hub
          pip install feedparser
          pip install tzdata

      - name: Run Bot
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          CREATOR_ID: ${{ secrets.CREATOR_ID }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: python bot.py
