name: Auto Post to Telegram Channel

on:
  schedule:
    - cron: '0 8 * * *'  # Запуск каждый день в 8:00 UTC (12:00 по Ижевску)
  workflow_dispatch:     # Ручной запуск

jobs:
  post-job:
    runs-on: ubuntu-latest
    steps:
      - name: Set timezone to Europe/Samara
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Europe/Samara"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache SQLite database
        uses: actions/cache@v3
        with:
          path: bot_memory.db
          key: bot-memory-${{ github.run_id }}
          restore-keys: |
            bot-memory-

      - name: Install Dependencies
        run: |
          pip install requests
          pip install huggingface_hub
          pip install feedparser

      - name: Run Bot
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python bot.py
